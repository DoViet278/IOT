<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>IoT - Action History</title>
    <link rel="stylesheet" href="history.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
   <div class="layout">
        <nav class="navbar">
            <div class="sidebar-title">
                <i class="fa-brands fa-pagelines"></i>
                <h2>IOT</h2>
            </div>

            <div class="nav-links">
                <a href="dashboard.html" ><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="sensors.html"><i class="fa-solid fa-database"></i> Data Sensors</a>
                <a href="history.html"  class="active"><i class="fa-solid fa-clock-rotate-left"></i> Actions History</a>
                <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
            </div>
        </nav>

    <div class="container">
        <div class="filter-bar">
            <div class="search-group">
                <div class="input-with-icon">
                    <i class="fa-solid fa-calendar"></i>
                    <input type="text" id="date-input" placeholder="dd/mm/yyyy">
                </div>
                <div class="input-with-icon">
                    <i class="fa-solid fa-clock"></i>
                    <input type="text" placeholder="hh:mm:ss" id="time-input">
                </div>
                <button class="btn-search"><i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm</button>

            </div>
            <select class="sensor-filter">
                <option value="all">Tất cả thiết bị</option>
                <option value="light">Đèn</option>
                <option value="fan">Quạt</option>
                <option value="air">Điều hòa</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Thiết bị</th>
                        <th>Hành động</th>
                        <th>Trạng thái</th>
                        <th>Thời gian</th>
                    </tr>
                </thead>
                <tbody id="history-data"></tbody>
            </table>
        </div>

        <div class="pagination" id="pagination">
            <button class="page-btn"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="page-btn active">1</button>
            <button class="page-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>
   </div>
<script src="history.js"></script>
</body>
</html>
